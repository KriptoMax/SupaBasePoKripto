<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupaBase Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 1.2rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        
        button { border: none; border-radius: 8px; padding: 12px; color: white; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        
        .btn-study { background-color: #28a745; }
        .btn-coffee { background-color: #ffc107; color: #333; }
        .btn-game { background-color: #17a2b8; }
        .btn-home { background-color: #6c757d; }

        .user-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; align-items: center; }
        .dot { height: 12px; width: 12px; background-color: #28a745; border-radius: 50%; margin-right: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Мой профиль</h2>
        <p id="my-info">Загрузка профиля...</p>
        <div class="grid">
            <button class="btn-study" onclick="updateMyStatus('📚 Учусь')">📚 Учусь</button>
            <button class="btn-coffee" onclick="updateMyStatus('☕ Кофе')">☕ Кофе</button>
            <button class="btn-game" onclick="updateMyStatus('🎮 В игре')">🎮 В игре</button>
            <button class="btn-home" onclick="updateMyStatus('🏠 Дома')">🏠 Дома</button>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="group-list">Загрузка списка...</div>
    </div>

    <script>
        // --- НАСТРОЙКИ (ПРОВЕРЬ СВОИ ДАННЫЕ) ---
        const SUPABASE_URL = 'https://ntkqkvgbmhhwrxcdntqg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Vf3rIV5OqOaDV73ZH3B6og_bYPzTusD'; // Используй anon/public key
        const MY_USER_ID = '502d2c0d-5183-4170-832d-84afe341c5e3'; // Твой ID из таблицы

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Функция обновления статуса
        async function updateMyStatus(newStatus) {
            const { error } = await supabase
                .from('profiles')
                .update({ status: newStatus })
                .eq('id', MY_USER_ID);

            if (error) {
                alert('Ошибка при обновлении!');
                console.error(error);
            } else {
                fetchGroup(); // Сразу обновляем список
            }
        }

        // Функция получения данных
        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) {
                console.error('Ошибка получения данных:', error);
                return;
            }

            const listContainer = document.getElementById('group-list');
            
            // Отрисовка списка
            listContainer.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="dot"></div>
                    <div style="flex-grow: 1;">
                        <strong>${user.username}</strong><br>
                        <small style="color: #666">${user.status || 'Нет статуса'}</small>
                    </div>
                </div>
            `).join('');

            // Обновление имени в шапке
            const me = data.find(u => u.id === MY_USER_ID);
            if (me) {
                document.getElementById('my-info').innerHTML = `Вы зашли как: <strong>${me.username}</strong>`;
            }
        }

        // Запуск при загрузке
        fetchGroup();

        // Обновление каждые 5 секунд
        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
