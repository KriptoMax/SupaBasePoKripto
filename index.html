<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Status Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; }
        .user-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; align-items: center; }
        .status-dot { height: 12px; width: 12px; border-radius: 50%; margin-right: 15px; }
        .online { background-color: #28a745; box-shadow: 0 0 8px #28a745; }
        .offline { background-color: #ccc; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { border: none; border-radius: 8px; padding: 12px; color: white; cursor: pointer; font-weight: bold; background: #007bff; }
        .email-label { color: #888; font-size: 0.8rem; font-weight: normal; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Мой профиль</h2>
        <p id="myInfo">Загрузка...</p>
        <div class="grid">
            <button onclick="changeStatus('🟢 В сети')">В сети</button>
            <button style="background: #6c757d;" onclick="changeStatus('⚪ Не в сети')">Не в сети</button>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="groupList">Загрузка списка...</div>
    </div>

    <script>
        // ДАННЫЕ ИЗ ТВОЕГО СКРИНШОТА
        const URL = 'https://rncerhgizyjhovbdpqnl.supabase.co';
        const KEY = 'sb_publishable_ThtftS6uBeaKf8FyndIFTg_OOHMJ5yh';
        const MY_ID = '4bc5694e-89f8-47d9-9b60-2d3bd2439122';

        const supabaseClient = supabase.createClient(URL, KEY);

        // Функция смены текста статуса
        window.changeStatus = async (text) => {
            const { error } = await supabaseClient
                .from('profiles')
                .update({ status: text }) // Убрал color, так как он вызывает ошибку
                .eq('id', MY_ID);

            if (error) {
                console.error("Ошибка RLS:", error.message);
                alert("Ошибка! Проверьте RLS политики.");
            }
        };

        async function init() {
            // 1. Загружаем пользователей
            let { data: users } = await supabaseClient.from('profiles').select('*').order('username');

            // 2. Realtime (кто открыл вкладку)
            const channel = supabaseClient.channel('presence-room', {
                config: { presence: { key: MY_ID } }
            });

            channel
                .on('presence', { event: 'sync' }, () => {
                    render(users, channel.presenceState());
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles' }, (payload) => {
                    users = users.map(u => u.id === payload.new.id ? payload.new : u);
                    render(users, channel.presenceState());
                })
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        await channel.track({ active: true });
                    }
                });

            render(users, {});
        }

        function render(users, onlineMap) {
            const list = document.getElementById('groupList');
            const onlineIds = Object.keys(onlineMap);

            list.innerHTML = users.map(user => {
                const isLive = onlineIds.includes(user.id);
                return `
                    <div class="user-item">
                        <div class="status-dot ${isLive ? 'online' : 'offline'}"></div>
                        <div style="flex-grow: 1;">
                            <strong>${user.username}</strong> 
                            ${user.email ? `<span class="email-label">(${user.email})</span>` : ''}
                            <br>
                            <small style="color: #666;">${user.status || 'Статус не задан'}</small>
                        </div>
                    </div>
                `;
            }).join('');

            const me = users.find(u => u.id === MY_ID);
            if (me) document.getElementById('myInfo').innerHTML = `Вы зашли как: <b>${me.username}</b>`;
        }

        init();
    </script>
</body>
</html>
