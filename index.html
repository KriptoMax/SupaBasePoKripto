<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Monitor Pro | Full Version</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Базовые стили */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #667eea; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Таймер */
        .timer-display { font-size: 2.5rem; font-weight: bold; color: #1a1a2e; margin: 10px 0; font-family: monospace; }
        .timer-status { font-size: 0.9rem; color: #28a745; font-weight: bold; }

        /* Чат */
        #chatMessages { 
            height: 350px; 
            overflow-y: auto; 
            background: #f8f9fa; 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #eee;
        }
        .msg { padding: 10px 14px; border-radius: 12px; background: white; max-width: 85%; align-self: flex-start; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .msg.my-msg { background: #667eea; color: white; align-self: flex-end; }
        .msg-author { font-size: 0.7rem; font-weight: bold; display: block; margin-bottom: 3px; opacity: 0.8; }

        /* Рейтинг */
        .rank-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; align-items: center; }
        .rank-time { font-family: monospace; font-size: 0.85rem; background: #eee; padding: 2px 6px; border-radius: 5px; }
        
        .badge-list { display: flex; gap: 8px; margin-top: 15px; }
        .badge { font-size: 1.5rem; filter: grayscale(100%); transition: 0.3s; cursor: help; }
        .badge.active { filter: grayscale(0%); transform: scale(1.1); }

        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 2px solid #edf2f7; border-radius: 10px; outline: none; transition: 0.2s; }
        input:focus { border-color: #667eea; }
        button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.9; }

        /* Кнопки действий */
        .btn-reset { background: #ff4757; font-size: 0.8rem; margin-top: 10px; width: 100%; }
        #uName { cursor: pointer; color: #667eea; text-decoration: underline; text-decoration-style: dotted; }
        #uName:hover { color: #1a1a2e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="card">
                <h2 id="uName" title="Нажми, чтобы увидеть статистику">Загрузка...</h2>
                <div class="timer-display" id="mainTimer">00:00:00</div>
                <p class="timer-status">● Идет учет времени</p>
                
                <button id="resetBtn" class="btn-reset">Сбросить прогресс обучения</button>

                <div class="badge-list" id="myBadges">
                    <span class="badge" id="b_early_bird" title="Ранняя пташка">🌅</span>
                    <span class="badge" id="b_marathon" title="Марафонец">🏃</span>
                    <span class="badge" id="b_activist" title="Активист">📣</span>
                </div>
            </div>

            <div class="card">
                <h3>💬 Общий чат</h3>
                <div id="chatMessages">Инициализация чата...</div>
                <div class="input-group">
                    <input type="text" id="chatInput" placeholder="Напишите сообщение...">
                    <button id="sendBtn">Отправить</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h3>🏆 Топ обучения</h3>
                <div id="leaderboard" style="margin-top: 10px;">
                    <p style="color: gray; font-size: 0.9rem;">Загрузка рейтинга...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ntkqkvgbmhhwrxcdntqg.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50a3FrdmdibWhod3J4Y2RudHFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Njg4NzQsImV4cCI6MjA4ODM0NDg3NH0.hMjEh6iJu4FBA24Ji4q7gCQ14vAx7C1EOGv4gkksQRQ';
        const supabaseClient = supabase.createClient(S_URL, S_KEY);
        
        const MY_ID = '502d2c0d-5183-4170-832d-84afe341c5e3';
        let myUsername = "Максим";
        let totalStudySeconds = 0;

        function formatTime(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        // 1. ЛОГИКА ТАЙМЕРА
        function startLiveTimer() {
            setInterval(async () => {
                totalStudySeconds++;
                document.getElementById('mainTimer').innerText = formatTime(totalStudySeconds);

                if (totalStudySeconds % 10 === 0) {
                    await supabaseClient
                        .from('profiles')
                        .update({ study_time: totalStudySeconds })
                        .eq('id', MY_ID);
                }
            }, 1000);
        }

        // 2. ФУНКЦИЯ ПОЛУЧЕНИЯ СТАТИСТИКИ (Для задания)
        async function getUserProfile(userId) {
            const { data, error } = await supabaseClient
                .from('profiles')
                .select('username, study_time, status')
                .eq('id', userId)
                .single();
        
            if (error) {
                console.error("Ошибка статистики:", error.message);
                return null;
            }
            return data;
        }

        // 3. ФУНКЦИЯ СБРОСА ВРЕМЕНИ (RPC) (Для задания)
        async function resetMyTime() {
            if (!confirm("Вы действительно хотите обнулить время?")) return;
            
            const { error } = await supabaseClient.rpc('reset_study_time', { user_uuid: MY_ID });
            
            if (!error) {
                totalStudySeconds = 0;
                document.getElementById('mainTimer').innerText = "00:00:00";
                alert("Время успешно сброшено!");
                loadMeta(); // Обновляем рейтинг
            } else {
                alert("Ошибка: " + error.message);
            }
        }

        // 4. ЗАГРУЗКА ДАННЫХ
        async function loadMeta() {
            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', MY_ID).single();
            if (profile) {
                myUsername = profile.username;
                totalStudySeconds = profile.study_time || 0;
                document.getElementById('uName').innerText = myUsername;
                document.getElementById('mainTimer').innerText = formatTime(totalStudySeconds);
            }

            // Загрузка достижений
            const { data: achs } = await supabaseClient.from('achievements').select('type').eq('user_id', MY_ID);
            if (achs) {
                achs.forEach(a => {
                    const el = document.getElementById(`b_${a.type}`);
                    if (el) el.classList.add('active');
                });
            }

            // Загрузка рейтинга
            const { data: top } = await supabaseClient.from('profiles')
                .select('username, study_time')
                .order('study_time', { ascending: false }).limit(5);

            if (top) {
                document.getElementById('leaderboard').innerHTML = top.map(u => `
                    <div class="rank-item">
                        <span>${u.username || 'Студент'}</span>
                        <span class="rank-time">${formatTime(u.study_time || 0)}</span>
                    </div>
                `).join('');
            }
        }

        // ЧАТ (Вспомогательные)
        function addMessageToUI(msg) {
            const container = document.getElementById('chatMessages');
            if (container.innerText.includes("Инициализация")) container.innerHTML = '';
            const div = document.createElement('div');
            div.className = `msg ${msg.user_id === MY_ID ? 'my-msg' : ''}`;
            div.innerHTML = `<span class="msg-author">${msg.username || 'Аноним'}</span><span class="msg-text">${msg.text}</span>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('chatInput');
            const val = input.value.trim();
            if (!val) return;
            await supabaseClient.from('messages').insert([{ user_id: MY_ID, username: myUsername, text: val }]);
            input.value = '';
        }

        // 5. ЗАПУСК
        async function init() {
            await loadMeta();
            
            // Загрузка истории чата
            const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
            if (data) data.forEach(m => addMessageToUI(m));

            startLiveTimer();

            // Привязка событий кнопкам
            document.getElementById('sendBtn').onclick = send;
            document.getElementById('chatInput').onkeypress = (e) => { if (e.key === 'Enter') send(); };
            
            // Привязка функции сброса к кнопке
            document.getElementById('resetBtn').onclick = resetMyTime;

            // Привязка получения статистики к клику на имя
            document.getElementById('uName').onclick = async () => {
                const stats = await getUserProfile(MY_ID);
                if (stats) {
                    alert(`Статистика ${stats.username}:\nВремя: ${formatTime(stats.study_time)}\nСтатус: ${stats.status}`);
                }
            };

            // Realtime чат
            supabaseClient.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => addMessageToUI(p.new)).subscribe();
        }

        init();
    </script>
</body>
</html>
