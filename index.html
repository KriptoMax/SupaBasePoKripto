<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #1a1a2e;
        }

        .profile-info {
            background: #f8f9ff;
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }

        .status-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            border: none;
            border-radius: 14px;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        .btn-online {
            background: linear-gradient(135deg, #28a745, #20c997);
        }

        .btn-online:hover {
            transform: scale(1.02);
        }

        .btn-offline {
            background: linear-gradient(135deg, #6c757d, #495057);
        }

        .btn-offline:hover {
            transform: scale(1.02);
        }

        .user-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #edf2f7;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 16px;
        }

        .online {
            background-color: #28a745;
            box-shadow: 0 0 0 2px rgba(40, 167, 69, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(40, 167, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }

        .offline {
            background-color: #adb5bd;
        }

        .user-name {
            font-weight: 600;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .email-label {
            color: #868e96;
            font-size: 0.7rem;
            background: #f1f3f5;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .status-text {
            font-size: 0.8rem;
            color: #6c757d;
            margin-top: 4px;
        }

        .badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }

        .badge-online {
            background: #28a745;
            color: white;
        }

        .badge-offline {
            background: #adb5bd;
            color: white;
        }

        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
            margin-top: 20px;
        }

        .error-box {
            text-align: center;
            padding: 40px;
            color: #dc3545;
            background: #fff5f5;
            border-radius: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>👤 Мой профиль</h2>
            <div class="profile-info" id="myInfo">
                <p>Загрузка данных...</p>
            </div>
            <div class="status-buttons">
                <button class="btn btn-online" id="btnOnline">🟢 В сети</button>
                <button class="btn btn-offline" id="btnOffline">⚪ Не в сети</button>
            </div>
        </div>

        <div class="card">
            <h2>👥 Монитор группы</h2>
            <div id="groupList" class="user-list">
                <div style="text-align: center; padding: 40px; color: #adb5bd;">Загрузка участников...</div>
            </div>
        </div>
        <div class="footer-note">
            ⚡ Статус обновляется в реальном времени • Зелёная точка — пользователь онлайн
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКИ SUPABASE ==========
        // ВАЖНО: Используем window.supabase, потому что библиотека загружена через script
        const SUPABASE_URL = 'https://ntkqkvgbmhhwrxcdntqg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50a3FrdmdibWhod3J4Y2RudHFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Njg4NzQsImV4cCI6MjA4ODM0NDg3NH0.hMjEh6iJu4FBA24Ji4q7gCQ14vAx7C1EOGv4gkksQRQ';
        const MY_USER_ID = '502d2c0d-5183-4170-832d-84afe341c5e3';

        // Проверка что Supabase загрузился
        if (typeof supabase === 'undefined') {
            document.body.innerHTML = '<div class="container"><div class="card"><div class="error-box">❌ Ошибка: Supabase не загрузился! Проверьте интернет соединение.</div></div></div>';
            throw new Error('Supabase not loaded');
        }

        // Создаем клиент Supabase
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let allUsers = [];
        let onlineUsers = {};

        // Функция для смены статуса
        async function changeStatus(newStatus) {
            try {
                console.log('🔄 Меняем статус на:', newStatus);
                
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .update({ 
                        status: newStatus,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', MY_USER_ID);
                
                if (error) throw error;
                
                console.log('✅ Статус обновлён');
                
                // Визуальный фидбек
                const infoBlock = document.getElementById('myInfo');
                infoBlock.style.background = '#e8f5e9';
                setTimeout(() => {
                    infoBlock.style.background = '#f8f9ff';
                }, 300);
                
            } catch (error) {
                console.error('❌ Ошибка при смене статуса:', error);
                alert('Ошибка: ' + error.message + '\n\nПроверьте: таблица profiles существует и RLS настроены');
            }
        }

        // Функция для отображения списка пользователей
        function renderUserList() {
            const container = document.getElementById('groupList');
            if (!container) return;
            
            if (!allUsers || allUsers.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #adb5bd;">👀 Пользователей пока нет</div>';
                return;
            }
            
            const onlineIds = new Set(Object.keys(onlineUsers));
            
            // Сортируем: сначала онлайн, потом по имени
            const sortedUsers = [...allUsers].sort((a, b) => {
                const aOnline = onlineIds.has(a.id);
                const bOnline = onlineIds.has(b.id);
                if (aOnline && !bOnline) return -1;
                if (!aOnline && bOnline) return 1;
                return (a.username || '').localeCompare(b.username || '');
            });
            
            const html = sortedUsers.map(user => {
                const isOnline = onlineIds.has(user.id);
                const isMe = user.id === MY_USER_ID;
                const userName = user.username || 'Без имени';
                const userEmail = user.email || '';
                const userStatus = user.status || '😴 Статус не указан';
                
                return `
                    <div class="user-item">
                        <div class="status-dot ${isOnline ? 'online' : 'offline'}"></div>
                        <div style="flex: 1;">
                            <div class="user-name">
                                ${escapeHtml(userName)} ${isMe ? '(Вы)' : ''}
                                ${userEmail ? `<span class="email-label">${escapeHtml(userEmail)}</span>` : ''}
                                <span class="badge ${isOnline ? 'badge-online' : 'badge-offline'}">
                                    ${isOnline ? '● Online' : '○ Offline'}
                                </span>
                            </div>
                            <div class="status-text">
                                📝 ${escapeHtml(userStatus)}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html;
        }
        
        // Защита от XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        // Обновление информации о текущем пользователе
        function updateMyProfileInfo() {
            const myProfile = allUsers.find(u => u.id === MY_USER_ID);
            const myInfoDiv = document.getElementById('myInfo');
            
            if (myInfoDiv) {
                if (myProfile) {
                    myInfoDiv.innerHTML = `
                        <p>
                            ✨ Вы вошли как: <b>${escapeHtml(myProfile.username)}</b><br>
                            <span style="font-size: 0.9rem; color: #667eea;">
                                📍 Текущий статус: ${escapeHtml(myProfile.status || 'Не задан')}
                            </span>
                        </p>
                    `;
                } else {
                    myInfoDiv.innerHTML = `
                        <p style="color: #dc3545;">
                            ⚠️ Ваш профиль не найден в таблице!<br>
                            <small>Выполните SQL запрос для создания профиля</small>
                        </p>
                    `;
                }
            }
        }

        // Основная инициализация
        async function init() {
            try {
                console.log('🚀 Инициализация монитора статусов...');
                console.log('Supabase client:', supabaseClient);
                
                // 1. Загружаем всех пользователей
                const { data: usersData, error: usersError } = await supabaseClient
                    .from('profiles')
                    .select('*');
                
                if (usersError) {
                    console.error('Ошибка загрузки:', usersError);
                    document.getElementById('groupList').innerHTML = `
                        <div class="error-box">
                            ❌ Ошибка загрузки: ${usersError.message}<br><br>
                            <small>Проверьте что таблица "profiles" существует</small>
                        </div>
                    `;
                    return;
                }
                
                allUsers = usersData || [];
                console.log(`✅ Загружено ${allUsers.length} пользователей`);
                
                // 2. Настройка Realtime Presence
                const channel = supabaseClient.channel('group-monitor', {
                    config: { presence: { key: MY_USER_ID } }
                });
                
                // Следим за изменениями presence (кто онлайн)
                channel.on('presence', { event: 'sync' }, () => {
                    onlineUsers = channel.presenceState();
                    renderUserList();
                });
                
                // Следим за изменениями в таблице profiles
                channel.on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'profiles' 
                }, (payload) => {
                    console.log('🔄 Обновление профиля:', payload.new.username);
                    const index = allUsers.findIndex(u => u.id === payload.new.id);
                    if (index !== -1) {
                        allUsers[index] = payload.new;
                    }
                    renderUserList();
                    updateMyProfileInfo();
                });
                
                // Подписываемся и добавляем себя в онлайн
                await channel.subscribe();
                await channel.track({ 
                    user_id: MY_USER_ID, 
                    online_at: new Date().toISOString() 
                });
                
                // Отображаем данные
                renderUserList();
                updateMyProfileInfo();
                
                console.log('✅ Инициализация завершена!');
                
            } catch (error) {
                console.error('💥 Критическая ошибка:', error);
                document.getElementById('groupList').innerHTML = `
                    <div class="error-box">
                        💥 Ошибка: ${error.message}
                    </div>
                `;
            }
        }
        
        // Привязываем обработчики к кнопкам
        const btnOnline = document.getElementById('btnOnline');
        const btnOffline = document.getElementById('btnOffline');
        
        if (btnOnline) btnOnline.onclick = () => changeStatus('🟢 В сети | Активен');
        if (btnOffline) btnOffline.onclick = () => changeStatus('⚪ Не в сети | Отошёл');
        
        // Запускаем приложение
        init();
    </script>
</body>
</html>
