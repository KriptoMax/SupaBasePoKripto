<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SupaBase Live Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; margin-bottom: 20px; }
        h2 { margin-top: 0; color: #333; font-size: 1.4rem; }
        .user-item { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; align-items: center; }
        .user-item:last-child { border-bottom: none; }
        .dot { height: 12px; width: 12px; border-radius: 50%; margin-right: 15px; flex-shrink: 0; }
        .online { background-color: #2ecc71; box-shadow: 0 0 10px rgba(46, 204, 113, 0.4); }
        .offline { background-color: #bdc3c7; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        button { border: none; border-radius: 10px; padding: 12px; color: white; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        .btn-on { background-color: #3498db; }
        .btn-off { background-color: #95a5a6; }
        .email-label { color: #7f8c8d; font-size: 0.8rem; font-weight: normal; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Мой профиль</h2>
        <p id="my-info" style="color: #666;">Подключение к базе...</p>
        <div class="grid">
            <button class="btn-on" onclick="sendUpdate('🟢 В сети')">Войти в сеть</button>
            <button class="btn-off" onclick="sendUpdate('⚪ Не в сети')">Выйти из сети</button>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="group-list" style="color: #999;">Загрузка списка...</div>
    </div>

    <script>
        // Копируй эти данные ОЧЕНЬ внимательно (без лишних пробелов)
        const S_URL = 'https://ntkqkvgbmhhwrxcdntqg.supabase.co';
        const S_KEY = 'sb_publishable_Vf3rIV5OqOaDV73ZH3B6og_bYPzTusD';
        const MY_ID = '502d2c0d-5183-4170-832d-84afe341c5e3';

        // Инициализация
        const sb = supabase.createClient(S_URL, S_KEY);

        // Функция смены статуса
        async function sendUpdate(txt) {
            const { error } = await sb.from('profiles').update({ status: txt }).eq('id', MY_ID);
            if (error) console.error("Ошибка обновления:", error.message);
        }

        async function init() {
            // 1. Первичная загрузка
            let { data: users, error } = await sb.from('profiles').select('*');
            if (error) {
                console.error("Ошибка загрузки:", error.message);
                return;
            }

            // 2. Настройка Realtime и Presence
            const room = sb.channel('main_room', { config: { presence: { key: MY_ID } } });

            room
                .on('presence', { event: 'sync' }, () => {
                    render(users, room.presenceState());
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles' }, (payload) => {
                    users = users.map(u => u.id === payload.new.id ? payload.new : u);
                    render(users, room.presenceState());
                })
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        await room.track({ online: true });
                    }
                });

            render(users, {});
        }

        function render(allUsers, onlineMap) {
            const container = document.getElementById('group-list');
            const onlineIds = Object.keys(onlineMap);

            container.innerHTML = allUsers.map(user => {
                const isLive = onlineIds.includes(user.id);
                return `
                    <div class="user-item">
                        <div class="dot ${isLive ? 'online' : 'offline'}"></div>
                        <div style="flex-grow: 1;">
                            <strong>${user.username}</strong> 
                            ${user.email ? `<span class="email-label">(${user.email})</span>` : ''}
                            <br>
                            <small style="color: #666;">${user.status || 'Статус не задан'}</small>
                        </div>
                    </div>
                `;
            }).join('');

            const me = allUsers.find(u => u.id === MY_ID);
            if (me) {
                document.getElementById('my-info').innerHTML = `Вы зашли как: <b>${me.username}</b>`;
            }
        }

        init();
    </script>
</body>
</html>
