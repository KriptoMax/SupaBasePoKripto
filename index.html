<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupaBaseKripto - Status Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 1.2rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        
        button { border: none; border-radius: 8px; padding: 12px; color: white; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        
        .btn-study { background-color: #28a745; }
        .btn-coffee { background-color: #ffc107; color: #333; }
        .btn-game { background-color: #17a2b8; }
        .btn-home { background-color: #6c757d; }

        .status-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; align-items: center; }
        .dot { height: 10px; width: 10px; background-color: #ffc107; border-radius: 50%; margin-right: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Мой профиль</h2>
        <p>Вы зашли как: <strong id="my-name">Загрузка...</strong></p>
        <div class="grid">
            <button class="btn-study" onclick="updateMyStatus('📚 Учусь')">📚 Учусь</button>
            <button class="btn-coffee" onclick="updateMyStatus('☕ Кофе')">☕ Кофе</button>
            <button class="btn-game" onclick="updateMyStatus('🎮 В игре')">🎮 В игре</button>
            <button class="btn-home" onclick="updateMyStatus('🏠 Дома')">🏠 Дома</button>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="group-list">
            </div>
    </div>

    <script>
        // --- НАСТРОЙКИ (ЗАМЕНИ НА СВОИ) ---
        const URL = 'https://ntkqkvgbmhhwrxcdntqg.supabase.co';
        const KEY = 'sb_publishable_Vf3rIV5OqOaDV73ZH3B6og_bYPzTusD';
        const supabase = createClient(URL, KEY);
        
        const MY_USER_ID = '502d2c0d-5183-4170-832d-84afe341c5e3'; 

        window.changeStatus = async (text, color) => {
            const { error } = await supabase
                .from('profiles')
                .update({ status: text, color: color})
                .eq('id', MY_USER_ID);

            if (error){
                alert('Error')
                console.error(error);
            } else {
                fetchGroup();
            }
        };

        async function fetchGroup(){
            const {data, error} = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true});

            if (error) return console.error(error);
            list.innerHTML = data.map(user => '
                <div class="user-item">
                    <div class="status dot" style="background: ${user.color || '#ccc'}"></div>
                    <div style="flex-grow: 1;">
                        <strong>${user.username}</strong><br>
                        <small style="color: #666>${user.status || 'Статус не задан'}</small>
                    </div>
                </div>
            ').join(''):

            const me = data.find(u => u.id === MY_USER_ID);
            if (me) document.getElementById('myInfo').innerText = 'Вы зашли как: ${me.username}';
        }

        fetchGroup();

        setInterval(fetchGroup, 5000);

        
    </script>
</body>
</html>
