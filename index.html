<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Monitor Pro | Multi-Account Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f0f13; --bg2: #18181f; --bg3: #22222c;
            --accent: #7c6af7; --accent2: #a78bfa;
            --text: #e8e6f0; --muted: #8885a0;
            --border: rgba(255,255,255,0.08);
            --green: #34d399; --red: #f87171;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* ЭКРАН ВХОДА */
        #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-box {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 28px; padding: 40px; width: 100%; max-width: 420px; text-align: center;
        }
        .btn-google {
            display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 16px;
            background: #fff; color: #1f1f1f; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-google:hover { background: #f3f3f3; transform: translateY(-2px); }

        /* ОСНОВНОЙ ЭКРАН */
        #appScreen { display: none; padding: 24px 16px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .layout { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        @media (max-width: 850px) { .layout { grid-template-columns: 1fr; } }

        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 24px; margin-bottom: 20px; }
        .card-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 15px; }

        .user-row { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .avatar { width: 48px; height: 48px; border-radius: 12px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .timer-display { font-family: 'Space Mono', monospace; font-size: 3.5rem; font-weight: 700; margin: 10px 0; }
        
        #chatMessages { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; background: var(--bg3); font-size: 14px; border: 1px solid var(--border); }
        .msg.mine { align-self: flex-end; background: rgba(124,106,247,0.1); border-color: rgba(124,106,247,0.2); }
        .msg-author { font-size: 11px; font-weight: 700; color: var(--accent2); margin-bottom: 2px; }

        .btn-reset { width: 100%; padding: 12px; background: rgba(248,113,113,0.05); color: var(--red); border: 1px solid rgba(248,113,113,0.1); border-radius: 12px; cursor: pointer; font-weight: 600; }
        
        #loadingScreen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--bg3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingScreen">
    <div class="spinner"></div>
</div>

<div id="loginScreen">
    <div class="login-box">
        <h1 style="margin-bottom: 10px;">Study Monitor</h1>
        <p style="color: var(--muted); margin-bottom: 30px;">Войдите, чтобы начать сессию обучения</p>
        <button class="btn-google" id="loginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Войти через Google
        </button>
    </div>
</div>

<div id="appScreen">
    <div class="layout">
        <main>
            <div class="card">
                <div class="user-row">
                    <div class="avatar" id="avatarEl">?</div>
                    <div style="flex: 1">
                        <div id="uName" style="font-weight: 700; font-size: 18px;">Загрузка...</div>
                        <div id="uEmail" style="font-size: 12px; color: var(--muted);"></div>
                    </div>
                    <button id="logoutBtn" style="background: none; border: none; color: var(--red); cursor: pointer; font-weight: 600;">Выйти</button>
                </div>
                <div class="card-title">Таймер обучения</div>
                <div class="timer-display" id="mainTimer">00:00:00</div>
                <button class="btn-reset" id="resetBtn">Сбросить время</button>
            </div>

            <div class="card">
                <div class="card-title">Чат группы</div>
                <div id="chatMessages"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="chatInput" placeholder="Введите сообщение..." style="flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: #fff; outline: none;">
                    <button id="sendBtn" style="background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 0 20px; cursor: pointer; font-weight: 700;">↑</button>
                </div>
            </div>
        </main>

        <aside>
            <div class="card">
                <div class="card-title">Топ студентов</div>
                <div id="leaderboard"></div>
            </div>
        </aside>
    </div>
</div>

<script>
const S_URL = 'https://ntkqkvgbmhhwrxcdntqg.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50a3FrdmdibWhod3J4Y2RudHFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Njg4NzQsImV4cCI6MjA4ODM0NDg3NH0.hMjEh6iJu4FBA24Ji4q7gCQ14vAx7C1EOGv4gkksQRQ';

// Настройка клиента: persistSession: false отключает авто-вход при обновлении
const sb = supabase.createClient(S_URL, S_KEY, {
    auth: {
        persistSession: false, 
        autoRefreshToken: true,
        detectSessionInUrl: true
    }
});

let MY_ID = null, myUsername = '', studySeconds = 0, timerInt = null;

const fmt = s => [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(v => String(v).padStart(2, '0')).join(':');

function toggleScreen(screen) {
    document.getElementById('loadingScreen').style.display = screen === 'loading' ? 'flex' : 'none';
    document.getElementById('loginScreen').style.display = screen === 'login' ? 'flex' : 'none';
    document.getElementById('appScreen').style.display = screen === 'app' ? 'block' : 'none';
}

// ВХОД: Добавлен prompt: 'select_account' для выбора почты каждый раз
async function login() {
    await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { 
            redirectTo: window.location.href,
            queryParams: { prompt: 'select_account' }
        }
    });
}

// ВЫХОД: Полная очистка
async function logout() {
    await sb.auth.signOut();
    window.localStorage.clear(); // Очищаем всё, чтобы сессии не путались
    location.reload();
}

async function initProfile(user) {
    const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
    
    // Если профиля нет (новая почта) или имя не совпадает — создаем/обновляем
    const googleName = user.user_metadata.full_name || 'Студент';
    
    if (!profile) {
        await sb.from('profiles').insert([{
            id: user.id, 
            email: user.email, 
            username: googleName, 
            study_time: 0
        }]);
        return { username: googleName, study_time: 0 };
    }
    return profile;
}

async function loadApp(user) {
    toggleScreen('loading');
    MY_ID = user.id;

    const profile = await initProfile(user);
    myUsername = profile.username;
    studySeconds = profile.study_time || 0;

    document.getElementById('uName').textContent = myUsername;
    document.getElementById('uEmail').textContent = user.email;
    document.getElementById('mainTimer').textContent = fmt(studySeconds);
    
    const pic = user.user_metadata.avatar_url;
    document.getElementById('avatarEl').innerHTML = pic ? `<img src="${pic}">` : myUsername[0];

    loadChat();
    loadRank();
    
    // Realtime подписка
    sb.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => renderMsg(p.new)).subscribe();
    
    toggleScreen('app');
    startTimer();
}

function startTimer() {
    if(timerInt) clearInterval(timerInt);
    timerInt = setInterval(() => {
        studySeconds++;
        document.getElementById('mainTimer').textContent = fmt(studySeconds);
        if(studySeconds % 10 === 0) {
            sb.from('profiles').update({ study_time: studySeconds }).eq('id', MY_ID).then();
        }
    }, 1000);
}

async function loadChat() {
    const { data } = await sb.from('messages').select('*').order('created_at', { ascending: false }).limit(20);
    if(data) {
        document.getElementById('chatMessages').innerHTML = '';
        data.reverse().forEach(renderMsg);
    }
}

function renderMsg(m) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = `msg ${m.user_id === MY_ID ? 'mine' : ''}`;
    div.innerHTML = `<div class="msg-author">${m.username}</div><div>${m.text}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

async function sendMsg() {
    const input = document.getElementById('chatInput');
    const val = input.value.trim();
    if(!val) return;
    input.value = '';
    await sb.from('messages').insert([{ user_id: MY_ID, username: myUsername, text: val }]);
}

async function loadRank() {
    const { data } = await sb.from('profiles').select('username, study_time').order('study_time', { ascending: false }).limit(5);
    if(data) {
        document.getElementById('leaderboard').innerHTML = data.map((u, i) => `
            <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px;">
                <span>${i+1}. ${u.username}</span>
                <span style="font-family: 'Space Mono'; color: var(--muted);">${fmt(u.study_time)}</span>
            </div>
        `).join('');
    }
}

// Привязка кнопок
document.getElementById('loginBtn').onclick = login;
document.getElementById('logoutBtn').onclick = logout;
document.getElementById('sendBtn').onclick = sendMsg;
document.getElementById('chatInput').onkeypress = e => { if(e.key === 'Enter') sendMsg(); };
document.getElementById('resetBtn').onclick = async () => {
    if(confirm('Обнулить время?')) {
        studySeconds = 0;
        document.getElementById('mainTimer').textContent = "00:00:00";
        await sb.from('profiles').update({ study_time: 0 }).eq('id', MY_ID);
    }
};

// Слушатель состояния
sb.auth.onAuthStateChange((event, session) => {
    if (session) loadApp(session.user);
    else toggleScreen('login');
});
</script>
</body>
</html>
