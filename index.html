<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Monitor & Chat | Монитор и Чат</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Профиль и Статусы */
        .profile-info {
            background: #f8f9ff;
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }

        .status-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            border: none;
            border-radius: 14px;
            padding: 14px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        .btn-online { background: linear-gradient(135deg, #28a745, #20c997); }
        .btn-offline { background: linear-gradient(135deg, #6c757d, #495057); }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* Таймер */
        .timer-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
        }
        .timer-display { text-align: center; padding: 10px; }
        .timer-value { font-size: 3rem; font-weight: bold; font-family: monospace; letter-spacing: 5px; }
        .timer-controls { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .timer-btn { border: none; border-radius: 10px; padding: 8px 15px; font-weight: 600; cursor: pointer; }

        /* Чат */
        .chat-container {
            height: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #chatMessages {
            flex: 1;
            overflow-y: auto;
            background: #f1f3f5;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 0.9rem;
            position: relative;
        }

        .msg-me { align-self: flex-end; background: #667eea; color: white; border-bottom-right-radius: 2px; }
        .msg-others { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 2px; }
        
        .msg-user { font-weight: bold; font-size: 0.7rem; margin-bottom: 3px; display: block; opacity: 0.8; }

        .chat-input-group { display: flex; gap: 10px; }
        .chat-input { flex: 1; padding: 12px; border: 2px solid #edf2f7; border-radius: 12px; outline: none; }
        .chat-input:focus { border-color: #667eea; }

        /* Список пользователей */
        .user-list { max-height: 300px; overflow-y: auto; }
        .user-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #edf2f7; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 12px; }
        .online { background-color: #28a745; box-shadow: 0 0 8px #28a745; }
        .offline { background-color: #adb5bd; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .stat-card { background: #f8f9ff; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #eee; }
        .stat-number { font-size: 1.2rem; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 0.7rem; color: #6c757d; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>👤 Мой профиль</h2>
            <div class="profile-info" id="myInfo">Загрузка...</div>
            <div class="status-buttons">
                <button class="btn btn-online" id="btnOnline">🟢 В сети</button>
                <button class="btn btn-offline" id="btnOffline">⚪ Не в сети</button>
            </div>
        </div>

        <div class="card timer-card">
            <h2>📚 Учеба</h2>
            <div class="timer-display">
                <div class="timer-value" id="timerDisplay">00:00:00</div>
            </div>
            <div class="timer-controls">
                <button class="timer-btn" style="background:#28a745; color:white" id="timerStart">▶</button>
                <button class="timer-btn" style="background:#ffc107" id="timerPause">⏸</button>
                <button class="timer-btn" style="background:#dc3545; color:white" id="timerReset">🔄</button>
            </div>
        </div>

        <div class="card">
            <h2>💬 Общий чат</h2>
            <div class="chat-container">
                <div id="chatMessages"></div>
                <div class="chat-input-group">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Сообщение...">
                    <button class="btn btn-online" id="btnSend" style="padding: 0 20px;">Отправить</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>👥 Группа <span id="onlineCountBadge" style="font-size:0.8rem; background:#28a745; padding:2px 8px; border-radius:10px; color:white">0</span></h2>
            <div id="groupList" class="user-list"></div>
        </div>

        <div class="card">
            <h2>📊 Статистика</h2>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number" id="totalToday">00:00</div><div class="stat-label">Сегодня</div></div>
                <div class="stat-card"><div class="stat-number" id="totalAll">00:00</div><div class="stat-label">Всего</div></div>
                <div class="stat-card"><div class="stat-number" id="studyStreak">0</div><div class="stat-label">Стрик 🔥</div></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ntkqkvgbmhhwrxcdntqg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50a3FrdmdibWhod3J4Y2RudHFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Njg4NzQsImV4cCI6MjA4ODM0NDg3NH0.hMjEh6iJu4FBA24Ji4q7gCQ14vAx7C1EOGv4gkksQRQ';
        const MY_USER_ID = '502d2c0d-5183-4170-832d-84afe341c5e3';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allUsers = [];
        let onlineUsers = {};
        let studySeconds = 0;
        let timerInterval = null;

        // --- ЧАТ ФУНКЦИИ ---
        async function loadChat() {
            const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
            if (data) {
                const container = document.getElementById('chatMessages');
                container.innerHTML = '';
                data.forEach(renderMessage);
            }
        }

        function renderMessage(msg) {
            const container = document.getElementById('chatMessages');
            const isMe = msg.user_id === MY_USER_ID;
            const div = document.createElement('div');
            div.className = `message ${isMe ? 'msg-me' : 'msg-others'}`;
            div.innerHTML = `<span class="msg-user">${msg.username || 'Аноним'}</span>${msg.text}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            const myProfile = allUsers.find(u => u.id === MY_USER_ID);
            const { error } = await supabaseClient.from('messages').insert([{
                user_id: MY_USER_ID,
                username: myProfile ? myProfile.username : 'Максим',
                text: text
            }]);
            
            if (!error) input.value = '';
        }

        // --- ТАЙМЕР И СТАТУСЫ ---
        function updateTimerDisplay() {
            const h = Math.floor(studySeconds / 3600);
            const m = Math.floor((studySeconds % 3600) / 60);
            const s = studySeconds % 60;
            document.getElementById('timerDisplay').textContent = 
                `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        async function changeStatus(s) {
            await supabaseClient.from('profiles').update({ status: s, updated_at: new Date() }).eq('id', MY_USER_ID);
        }

        function renderUserList() {
            const container = document.getElementById('groupList');
            const onlineIds = new Set(Object.keys(onlineUsers));
            document.getElementById('onlineCountBadge').textContent = onlineIds.size;

            container.innerHTML = allUsers.map(user => {
                const isOnline = onlineIds.has(user.id);
                return `
                    <div class="user-item">
                        <div class="status-dot ${isOnline ? 'online' : 'offline'}"></div>
                        <div style="flex:1">
                            <div style="font-weight:600; font-size:0.9rem">${user.username} ${user.id === MY_USER_ID ? '(Вы)' : ''}</div>
                            <div style="font-size:0.75rem; color:#666">${user.status || ''}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- ИНИЦИАЛИЗАЦИЯ ---
        async function init() {
            // 1. Загрузка данных
            const { data: users } = await supabaseClient.from('profiles').select('*');
            allUsers = users || [];
            
            // 2. Чат и История
            await loadChat();

            // 3. Realtime сообщения
            supabaseClient.channel('schema-db-changes')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    renderMessage(payload.new);
                })
                .subscribe();

            // 4. Realtime профили и онлайн
            const channel = supabaseClient.channel('group-monitor', { config: { presence: { key: MY_USER_ID } } });
            
            channel.on('presence', { event: 'sync' }, () => {
                onlineUsers = channel.presenceState();
                renderUserList();
            }).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles' }, payload => {
                const idx = allUsers.findIndex(u => u.id === payload.new.id);
                if (idx !== -1) allUsers[idx] = payload.new;
                renderUserList();
                if (payload.new.id === MY_USER_ID) updateMyInfo(payload.new);
            }).subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await channel.track({ online_at: new Date().toISOString() });
                }
            });

            renderUserList();
            const me = allUsers.find(u => u.id === MY_USER_ID);
            if (me) {
                updateMyInfo(me);
                studySeconds = me.study_time || 0;
                updateTimerDisplay();
            }
        }

        function updateMyInfo(me) {
            document.getElementById('myInfo').innerHTML = `<b>${me.username}</b><br><span style="font-size:0.8rem">${me.status}</span>`;
        }

        // Кнопки
        document.getElementById('btnSend').onclick = sendMessage;
        document.getElementById('chatInput').onkeyup = (e) => e.key === 'Enter' && sendMessage();
        document.getElementById('btnOnline').onclick = () => changeStatus('🟢 В сети | Активен');
        document.getElementById('btnOffline').onclick = () => changeStatus('⚪ Не в сети | Отошёл');
        
        document.getElementById('timerStart').onclick = () => {
            if (timerInterval) return;
            timerInterval = setInterval(async () => {
                studySeconds++;
                updateTimerDisplay();
                if (studySeconds % 10 === 0) { // Сохраняем каждые 10 сек
                    await supabaseClient.from('profiles').update({ study_time: studySeconds }).eq('id', MY_USER_ID);
                }
            }, 1000);
        };
        document.getElementById('timerPause').onclick = () => {
            clearInterval(timerInterval);
            timerInterval = null;
        };

        init();
    </script>
</body>
</html>
