<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SupaBase Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; }
        .user-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; align-items: center; }
        .dot { height: 12px; width: 12px; border-radius: 50%; margin-right: 15px; }
        .online { background-color: #28a745; box-shadow: 0 0 8px #28a745; }
        .offline { background-color: #ccc; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { border: none; border-radius: 8px; padding: 12px; color: white; cursor: pointer; font-weight: bold; background: #007bff; }
        .email-label { color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Мой профиль</h2>
        <p id="my-info">Подключение к системе...</p>
        <div class="grid">
            <button onclick="updateStatus('🟢 В сети')">Войти в сеть</button>
            <button style="background: #6c757d;" onclick="updateStatus('⚪ Не в сети')">Отойти</button>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="group-list">Загрузка списка...</div>
    </div>

    <script>
        // --- ПРОВЕРЬ ЭТИ ДАННЫЕ (БЕЗ ПРОБЕЛОВ ВНУТРИ) ---
        const SB_URL = 'https://ntkqkvgbmhhwrxcdntqg.supabase.co';
        const SB_KEY = 'sb_publishable_Vf3rIV5OqOaDV73ZH3B6og_bYPzTusD';
        const MY_ID = '502d2c0d-5183-4170-832d-84afe341c5e3'; 

        // Инициализация (переименовал, чтобы не было конфликтов)
        const mySupabase = supabase.createClient(SB_URL, SB_KEY);

        // Функция обновления статуса
        async function updateStatus(txt) {
            const { error } = await mySupabase.from('profiles').update({ status: txt }).eq('id', MY_ID);
            if (error) console.error("Ошибка:", error.message);
        }

        async function initApp() {
            // 1. Получаем список всех из базы
            let { data: users, error } = await mySupabase.from('profiles').select('*');
            if (error) return console.error("Ошибка загрузки пользователей:", error);

            // 2. Настраиваем Presence (кто сейчас на сайте)
            const channel = mySupabase.channel('online_room', {
                config: { presence: { key: MY_ID } }
            });

            channel
                .on('presence', { event: 'sync' }, () => {
                    render(users, channel.presenceState());
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles' }, (payload) => {
                    // Мгновенно обновляем текст статуса у всех
                    users = users.map(u => u.id === payload.new.id ? payload.new : u);
                    render(users, channel.presenceState());
                })
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        await channel.track({ online: true });
                    }
                });

            render(users, {});
        }

        function render(allUsers, onlineMap) {
            const list = document.getElementById('group-list');
            const onlineIds = Object.keys(onlineMap);

            list.innerHTML = allUsers.map(user => {
                const isLive = onlineIds.includes(user.id);
                return `
                    <div class="user-item">
                        <div class="dot ${isLive ? 'online' : 'offline'}"></div>
                        <div style="flex-grow: 1;">
                            <strong>${user.username}</strong> 
                            ${user.email ? `<span class="email-label">(${user.email})</span>` : ''}
                            <br>
                            <small>${user.status || 'Нет статуса'}</small>
                        </div>
                    </div>
                `;
            }).join('');

            const me = allUsers.find(u => u.id === MY_ID);
            if (me) document.getElementById('my-info').innerHTML = `Вы зашли как: <b>${me.username}</b>`;
        }

        initApp();
    </script>
</body>
</html>
