<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Monitor Pro | Исправленный чат</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Базовые стили */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #667eea; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Чат */
        #chatMessages { 
            height: 350px; 
            overflow-y: auto; 
            background: #f1f3f5; 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .msg { padding: 8px 12px; border-radius: 10px; background: white; max-width: 90%; align-self: flex-start; border: 1px solid #eee; }
        .msg.my-msg { background: #667eea; color: white; align-self: flex-end; }
        .msg-author { font-size: 0.7rem; font-weight: bold; display: block; margin-bottom: 2px; opacity: 0.8; }

        /* Рейтинг */
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .badge-list { display: flex; gap: 5px; margin-top: 10px; }
        .badge { font-size: 1.2rem; filter: grayscale(100%); transition: 0.3s; }
        .badge.active { filter: grayscale(0%); }

        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main">
            <div class="card">
                <h2 id="uName">Загрузка...</h2>
                <div class="badge-list" id="myBadges">
                    <span class="badge" id="b_early" title="Ранняя пташка (до 8:00)">🌅</span>
                    <span class="badge" id="b_marathon" title="Марафонец (2ч учебы)">🏃</span>
                    <span class="badge" id="b_activist" title="Активист (20 сообщений)">📣</span>
                </div>
            </div>

            <div class="card">
                <h3>💬 Общий чат</h3>
                <div id="chatMessages">Загрузка сообщений...</div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="chatInput" placeholder="Введите сообщение...">
                    <button id="sendBtn">Отправить</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h3>🏆 Топ студентов</h3>
                <div id="leaderboard"></div>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ntkqkvgbmhhwrxcdntqg.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // твой ключ
        const supabase = supabase.createClient(S_URL, S_KEY); // Вот это объявлени
        const MY_ID = '502d2c0d-5183-4170-832d-84afe341c5e3';

        let myUsername = "Максим";

        // 1. Отрисовка сообщения
        function addMessageToUI(msg, isHistory = false) {
            const container = document.getElementById('chatMessages');
            if (isHistory && container.innerText === "Загрузка сообщений...") container.innerHTML = '';
            
            const div = document.createElement('div');
            const isMe = msg.user_id === MY_ID;
            div.className = `msg ${isMe ? 'my-msg' : ''}`;
            div.innerHTML = `<span class="msg-author">${msg.username || 'Аноним'}</span>${msg.text}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // 2. Загрузка истории
        async function loadHistory() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(50);
            
            const container = document.getElementById('chatMessages');
            container.innerHTML = ''; 
            if (data) data.forEach(m => addMessageToUI(m, true));
        }

        // 3. Отправка
        async function send() {
            const input = document.getElementById('chatInput');
            const val = input.value.trim();
            if (!val) return;

            const { error } = await supabase.from('messages').insert([
                { user_id: MY_ID, username: myUsername, text: val }
            ]);
            if (error) console.error(error);
            input.value = '';
        }

        // 4. Достижения и Рейтинг
        async function loadMeta() {
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', MY_ID).single();
            if (profile) {
                myUsername = profile.username;
                document.getElementById('uName').innerText = myUsername;
            }

            const { data: achs } = await supabase.from('achievements').select('type').eq('user_id', MY_ID);
            achs?.forEach(a => document.getElementById(`b_${a.type}`)?.classList.add('active'));

            const { data: top } = await supabase.from('profiles').select('username, study_time').order('study_time', { ascending: false }).limit(5);
            document.getElementById('leaderboard').innerHTML = top.map(u => 
                `<div class="rank-item"><span>${u.username}</span><b>${Math.floor(u.study_time/3600)}ч</b></div>`
            ).join('');
        }

        // 5. Инициализация
        async function init() {
            await loadMeta();
            await loadHistory();

            // Realtime подписка
            supabase.channel('messages_realtime')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    addMessageToUI(payload.new);
                })
                .subscribe();

            document.getElementById('sendBtn').onclick = send;
            document.getElementById('chatInput').onkeypress = (e) => { if(e.key === 'Enter') send(); };
        }

        init();
    </script>
</body>
</html>
